<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KWM Order Form</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

</head>

<body>

<div class="container">

    <!-- Header -->

    <header class="header">

        <img src="KWM logo.jpg" class="logo" alt="Company Logo">

        <div>

            <h1>Aman Engineering Works</h1>

            <p>Happy to receive your Order</p>

        </div>

    </header>

    <!-- Order Form -->

    <div class="card">

        <h2>Order Form</h2>

        <div id="errorMessage" class="error"></div>

        <div id="successMessage" class="success"></div>

        <div class="form-group">

            <label>Party Name</label>

            <input
                type="text"
                id="partyName"
                placeholder="Enter Party Name">

        </div>

        <div id="itemsContainer"></div>
<br>
       <center> 

        <button
            id="submitBtn"
            onclick="placeOrder()">

            Place Order

        </button> </center>

    </div>

    <!-- Thank You Page -->

    <div
        id="thankYouPage"
        class="thankyou"
        style="display:none;">

        <h2>🎉 Order Placed Successfully</h2>

        <p id="thankYouText"></p>

        <button onclick="newOrder()">

            Place New Order

        </button>

    </div>

</div>

<footer>

    <p>

        Managed by

        <strong>Aman Engineering Works</strong>

    </p>

    <p>

        © 2026

    </p>

</footer>



</body>
</html>
